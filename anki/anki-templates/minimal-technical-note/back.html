<article class="minimal-card minimal-card--back">
  <main class="minimal-card__body">
    <div class="minimal-section">
      <span class="minimal-label">Question</span>
      <section id="question-rendered" class="minimal-markdown minimal-markdown--question"></section>
      <pre id="question-source" class="minimal-source">{{Question}}</pre>
    </div>

    <div class="minimal-divider"></div>

    <div class="minimal-section minimal-section--note">
      <span class="minimal-label">Note</span>
      <section id="note-rendered" class="minimal-markdown"></section>
      <pre id="note-source" class="minimal-source">{{Note}}</pre>
    </div>
  </main>
</article>

<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script>
(function () {
  function fallbackMarkdown(source) {
    return source
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\n/g, "<br>");
  }

  function readMarkdownSource(source) {
    var html = source.innerHTML
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<\/div>\s*<div>/gi, "\n")
      .replace(/<\/p>\s*<p>/gi, "\n\n")
      .replace(/<\/?div>/gi, "")
      .replace(/<\/?p>/gi, "")
      .replace(/\n{3,}/g, "\n\n");
    var decoder = document.createElement("textarea");
    decoder.innerHTML = html;
    return decoder.value.trim();
  }

  function createRenderer() {
    if (!window.markdownit) {
      return null;
    }

    return window.markdownit({
      breaks: true,
      html: true,
      linkify: true,
      typographer: true
    });
  }

  function renderMarkdown(sourceId, targetId, md) {
    var source = document.getElementById(sourceId);
    var target = document.getElementById(targetId);

    if (!source || !target) {
      return;
    }

    var text = readMarkdownSource(source);
    target.innerHTML = md ? md.render(text) : fallbackMarkdown(text);
  }

  var md = createRenderer();
  renderMarkdown("question-source", "question-rendered", md);
  renderMarkdown("note-source", "note-rendered", md);
})();
</script>
