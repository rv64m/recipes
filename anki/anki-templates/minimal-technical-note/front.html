<article class="minimal-card minimal-card--front">
  <header class="minimal-card__title">Technical Note</header>

  <main class="minimal-card__body">
    <div class="minimal-section">
      <span class="minimal-label">Question</span>
      <section id="question-rendered" class="minimal-markdown"></section>
      <pre id="question-source" class="minimal-source">{{Question}}</pre>
    </div>
  </main>
</article>

<script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
<script>
(function () {
  function fallbackMarkdown(source) {
    return source
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\n/g, "<br>");
  }

  function readMarkdownSource(source) {
    var html = source.innerHTML
      .replace(/<br\s*\/?>/gi, "\n")
      .replace(/<\/div>\s*<div>/gi, "\n")
      .replace(/<\/p>\s*<p>/gi, "\n\n")
      .replace(/<\/?div>/gi, "")
      .replace(/<\/?p>/gi, "")
      .replace(/\n{3,}/g, "\n\n");
    var decoder = document.createElement("textarea");
    decoder.innerHTML = html;
    return decoder.value.trim();
  }

  function renderMarkdown(sourceId, targetId) {
    var source = document.getElementById(sourceId);
    var target = document.getElementById(targetId);

    if (!source || !target) {
      return;
    }

    var text = readMarkdownSource(source);

    if (window.markdownit) {
      var md = window.markdownit({
        breaks: true,
        html: true,
        linkify: true,
        typographer: true
      });

      target.innerHTML = md.render(text);
    } else {
      target.innerHTML = fallbackMarkdown(text);
    }
  }

  renderMarkdown("question-source", "question-rendered");
})();
</script>
